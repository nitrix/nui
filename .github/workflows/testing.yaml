name: Testing

on:
  push:
    branches:
      - master
jobs:
  tests:
    name: Tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up LLVM
        uses: egor-tensin/setup-clang@v1
        with:
          version: latest
          platform: x64
      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build git
          sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl-dev libwayland-dev libxkbcommon-dev
      - name: Build
        run: |
          mkdir build
          cd build
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ..
          ninja test
